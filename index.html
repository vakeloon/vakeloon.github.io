<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Казино Слот</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <div id="username" class="username"></div>
            <div id="balance" class="balance">Balance: </div>
        </div>
    </header>
    <div class="slot-machine">
        <div class="reels">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍋</div>
            <div class="reel" id="reel3">🔔</div>
        </div>
        <button class="button" onclick="spin()">Spin</button>
        <div id="result" class="result"></div>
    </div>
    <button id="btn" class="button">Show/Hide Main Button</button>
    <button id="btnED" class="button">Enable/Disable Main Button</button>

    <script src="script.js"></script>
</body>
</html>
